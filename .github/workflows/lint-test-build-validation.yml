name: Validate Lint, Test, Build
on:
  push:
    branches:
      - 'feature/**'
jobs:
  validations:
    runs-on: ubuntu-latest
    steps:
      - name: setup
        uses: actions/checkout@v4
      - run: npm ci

      - name: lint
        run: npm run lint

      - name: test
        run: npm run test

      - name: build
        run: npm run build


